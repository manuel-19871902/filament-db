<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>Filament DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131a;
    --card:     #1c1c27;
    --border:   #2a2a3a;
    --accent:   #00e5ff;
    --accent2:  #ff6b35;
    --text:     #e8e8f0;
    --muted:    #6b6b85;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
    --radius:   12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,229,255,.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,107,53,.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

  /* ── Header ── */
  .hdr {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .hdr-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0077aa);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .hdr-title { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
  .hdr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Search ── */
  .search-wrap { position: relative; margin-bottom: 20px; }
  .search-wrap input {
    width: 100%; padding: 14px 46px 14px 18px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--sans); font-size: 15px;
    outline: none; transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap .ico { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  /* ── Filter chips ── */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip {
    padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); cursor: pointer; transition: all .15s;
    font-family: var(--mono); letter-spacing: .3px;
  }
  .chip.active, .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }

  /* ── Section label ── */
  .section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin: 24px 0 10px;
  }

  /* ── Filament card ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    margin-bottom: 8px; cursor: pointer;
    transition: border-color .15s, transform .1s;
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 14px; align-items: center;
  }
  .card:hover { border-color: var(--accent); transform: translateX(2px); }
  .card.color-card { grid-template-columns: 28px auto 1fr auto; gap: 12px; padding: 12px 16px; }

  .swatch {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,.12); flex-shrink: 0;
  }
  .card-id { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 3px; }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-badge {
    padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
    font-family: var(--mono); white-space: nowrap;
    background: rgba(255,255,255,.06); color: var(--muted);
  }

  /* ── Detail panel ── */
  .detail {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
    align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .detail.open { display: flex; }
  .detail-sheet {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; width: 100%; max-width: 680px;
    max-height: 92vh; overflow-y: auto;
    padding: 0 0 40px;
    animation: slideUp .25s cubic-bezier(.32,1,.64,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .detail-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 0; }
  .detail-head {
    display: grid; grid-template-columns: 1fr auto;
    align-items: start; padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-id { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 4px; }
  .detail-name { font-size: 22px; font-weight: 600; line-height: 1.2; }
  .detail-brand { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .close-btn {
    width: 36px; height: 36px; border-radius: 99px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Color swatch large */
  .detail-swatch-wrap { padding: 20px 24px 0; }
  .detail-swatch-large {
    width: 100%; height: 80px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.1);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
  }

  /* Grid */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 24px; }
  .detail-grid.single { grid-template-columns: 1fr; }
  .dg-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .dg-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-family: var(--mono); margin-bottom: 5px; }
  .dg-value { font-size: 15px; font-weight: 600; }
  .dg-value.mono { font-family: var(--mono); font-size: 13px; }
  .dg-value.ok   { color: #4ade80; }
  .dg-value.warn { color: #f97316; }
  .dg-value.bad  { color: #f87171; }

  /* Temp display */
  .temp-row { display: flex; align-items: baseline; gap: 6px; }
  .temp-main { font-size: 26px; font-weight: 700; font-family: var(--mono); color: var(--accent2); }
  .temp-range { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  /* Section heading inside detail */
  .detail-section { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 4px 24px 0; margin-top: 8px; }

  /* Colors list inside master detail */
  .colors-list { padding: 0 24px; }
  .color-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .color-row:last-child { border-bottom: none; }
  .cr-swatch { width: 22px; height: 22px; border-radius: 5px; border: 1px solid rgba(255,255,255,.1); flex-shrink: 0; }
  .cr-name { font-size: 13px; flex: 1; }
  .cr-id { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .cr-hex { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* Back breadcrumb */
  .back-btn {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 13px; color: var(--muted); padding: 16px 24px 0;
    transition: color .15s;
  }
  .back-btn:hover { color: var(--accent); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .ico { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Stats bar */
  .stats {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 14px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .stat { font-size: 12px; color: var(--muted); }
  .stat span { color: var(--text); font-weight: 600; font-family: var(--mono); }

  /* QR landing */
  #qr-result {
    display: none;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
  }
  #qr-result.show { display: block; }
  .qr-banner {
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,229,255,.08); border: 1px solid rgba(0,229,255,.3);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
  }
  .qr-banner-icon { font-size: 24px; }
  .qr-banner-text { font-size: 13px; color: var(--accent); font-weight: 600; }
  .qr-banner-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>

    <div id="qr-detail-inline"></div>

  <!-- Search -->

    <span class="ico">⌕</span>
  </div>

  <!-- Filter chips -->

    <div class="chip" data-filter="ESN">eSUN</div>
    <div class="chip" data-filter="ERY">ERYONE</div>

    <div class="chip" data-filter="SUN">SUNLU</div>
    <div class="chip" data-filter="colors">🎨 Farben</div>
  </div>

  <div class="stats" id="stats"></div>
  <div id="list"></div>
</div>

<!-- Detail panel -->
<div class="detail" id="detail" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="detail-handle"></div>

</div>

function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

const scannedId = getParam('id');
if (scannedId) {
  const qrDiv = document.getElementById('qr-result');
  const subEl  = document.getElementById('qr-banner-sub');
  qrDiv.classList.add('show');
  subEl.textContent = `ID: ${scannedId}`;

  // Render inline detail
  const target = document.getElementById('qr-detail-inline');
  if (masterMap[scannedId]) {
    target.innerHTML = buildMasterHTML(masterMap[scannedId]);
  } else if (colorMap[scannedId]) {
    target.innerHTML = buildColorHTML(colorMap[scannedId]);
  } else {
    target.innerHTML = `<p style="color:var(--muted);font-size:13px;padding:8px 0">ID nicht gefunden: ${scannedId}</p>`;
  }
  // Scroll to top
  window.scrollTo(0,0);
}

// RENDER HELPERS

function brandColor(id) {
  const p = id.slice(0,3);
  return {BAM:'#2563EB',ESN:'#16A34A',ERY:'#DC2626',GEE:'#2563EB',SUN:'#D97706'}[p]||'#888';
}
function matBadgeColor(mat) {
  const m = mat.toUpperCase();
  if(m.includes('CF')||m.includes('GF')) return '#f97316';
  if(m==='ABS'||m==='ASA') return '#ef4444';
  if(m.includes('PA')||m==='PC'||m.includes('PEEK')) return '#a855f7';
  if(m.includes('TPU')) return '#10b981';
  if(m.includes('PETG')) return '#3b82f6';
  return '#6b7280';
}
function luminance(hex){
  const h=hex.replace('#','');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return 0.299*r+0.587*g+0.114*b;
}

function buildColorHTML(c) {
  const [farbId, masterId, colorName, hex] = c;
  const master = masterMap[masterId];
  const lum = luminance(hex);
  const textC = lum < 130 ? '#FFFFFF' : '#000000';
  return `
    <div class="detail-head">
      <div>
        <div class="detail-id">${farbId}</div>
        <div class="detail-name">${colorName}</div>
        <div class="detail-brand">${master?master[1]+' · '+master[2]:masterId}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-swatch-wrap">
      <div class="detail-swatch-large" style="background:${hex};color:${textC}">${hex}</div>
    </div>
    <div class="detail-section">FARB-DETAILS</div>
    <div class="detail-grid">
      <div class="dg-item"><div class="dg-label">Farb-ID</div><div class="dg-value mono">${farbId}</div></div>
      <div class="dg-item"><div class="dg-label">HEX-Code</div><div class="dg-value mono">${hex}</div></div>
      <div class="dg-item"><div class="dg-label">Master-Filament</div><div class="dg-value mono">${masterId}</div></div>
      <div class="dg-item"><div class="dg-label">Modell</div><div class="dg-value" style="font-size:13px">${master?master[2]:'-'}</div></div>
    </div>
    ${master?`
    <div class="back-btn" onclick="openMasterDetail('${masterId}')">← Zu ${master[2]} (${masterId})</div>
    <div class="detail-section">DRUCKEINSTELLUNGEN</div>
    <div class="detail-grid">
      <div class="dg-item"><div class="dg-label">Düsentemp</div><div class="temp-row"><span class="temp-main">${master[4]}°</span><span class="temp-range">${master[5]}–${master[6]} °C</span></div></div>
      <div class="dg-item"><div class="dg-label">Betttemp</div><div class="temp-row"><span class="temp-main" style="color:var(--accent)">${master[7]}°</span><span class="temp-range">${master[8]}–${master[9]} °C</span></div></div>
      <div class="dg-item"><div class="dg-label">Geschwindigkeit</div><div class="dg-value mono">${master[10]} mm/s</div></div>
      <div class="dg-item"><div class="dg-label">Kühlung</div><div class="dg-value mono">${master[12]}%</div></div>
    </div>`:''}
  `;
}

// ══════════════════════════════════════════════════════════════════════════
// LIST RENDERING
// ══════════════════════════════════════════════════════════════════════════
let activeFilter = 'all';
let searchQuery  = '';
let showColors   = false;

function render() {
  const list = document.getElementById('list');
  const stats = document.getElementById('stats');
  const q = searchQuery.toLowerCase();

  let filtered = MASTERS.filter(m => {
    if(activeFilter !== 'all' && activeFilter !== 'colors' && !m[0].startsWith(activeFilter)) return false;
    if(activeFilter === 'colors') return false;
    if(q && !m[0].toLowerCase().includes(q) && !m[2].toLowerCase().includes(q) && !m[3].toLowerCase().includes(q) && !m[1].toLowerCase().includes(q)) return false;
    return true;
  });

  let filteredColors = [];
  if(activeFilter === 'colors' || activeFilter === 'all') {
    filteredColors = COLORS.filter(c => {
      if(q && !c[0].toLowerCase().includes(q) && !c[2].toLowerCase().includes(q) && !c[3].toLowerCase().includes(q)) return false;
      return true;
    });
  }

  // Stats
  stats.innerHTML = `
    <div class="stat">Filamente: <span>${filtered.length}</span></div>
    ${filteredColors.length ? `<div class="stat">Farben: <span>${filteredColors.length}</span></div>` : ''}
    <div class="stat">Gesamt: <span>${filtered.length + filteredColors.length}</span></div>
  `;

  let html = '';

  if(filtered.length) {
    if(activeFilter === 'all') html += `<div class="section-label">Master-Filamente</div>`;
    filtered.forEach(m => {
      const pfxColor = brandColor(m[0]);
      html += `
        <div class="card" onclick="openMasterDetail('${m[0]}')">
          <div style="width:4px;height:40px;border-radius:2px;background:${pfxColor};flex-shrink:0"></div>
          <div>
            <div class="card-id">${m[0]}</div>
            <div class="card-name">${m[2]}</div>
            <div class="card-sub">${m[1]}</div>
          </div>
          <div>
            <div class="card-badge" style="color:${matBadgeColor(m[3])};border-color:${matBadgeColor(m[3])}33">${m[3]}</div>
            <div style="font-size:11px;color:var(--muted);text-align:right;margin-top:6px">${m[4]}°C / ${m[7]}°C</div>
          </div>
        </div>`;
    });
  }

  if(filteredColors.length) {
    html += `<div class="section-label" style="margin-top:20px">Farb-Varianten</div>`;
    filteredColors.forEach(c => {
      const lum = luminance(c[3]);
      html += `
        <div class="card color-card" onclick="openColorDetail('${c[0]}')">
          <div class="swatch" style="background:${c[3]}"></div>
          <div>
            <div class="card-id">${c[0]}</div>
            <div class="card-name">${c[2]}</div>
            <div class="card-sub">${masterMap[c[1]]?masterMap[c[1]][2]:c[1]}</div>
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${c[3]}</div>
        </div>`;
    });
  }

  if(!html) {
    html = `<div class="empty"><div class="ico">🔍</div><p>Keine Ergebnisse für „${q}"</p></div>`;
  }

  list.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════════════════════════════════════
function openMasterDetail(id) {
  const m = masterMap[id];
  if(!m) return;
  document.getElementById('detail-content').innerHTML = buildMasterHTML(m);
  document.getElementById('detail').classList.add('open');
  document.body.style.overflow='hidden';
}

function openColorDetail(id) {
  const c = colorMap[id];
  if(!c) return;
  document.getElementById('detail-content').innerHTML = buildColorHTML(c);
  document.getElementById('detail').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(e) {
  if(e && e.target !== document.getElementById('detail')) return;
  document.getElementById('detail').classList.remove('open');
  document.body.style.overflow='';
}

window.closeDetail = closeDetail;
window.openMasterDetail = openMasterDetail;
window.openColorDetail = openColorDetail;

// ══════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  });
});

// Keyboard close
document.addEventListener('keydown', e => {
  if(e.key==='Escape') closeDetail();
});

render();
</script>
</body>
</html>
