<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Filament DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════ */
:root {
  --bg:        #0c0c0e;
  --bg1:       #111115;
  --bg2:       #18181f;
  --bg3:       #1f1f28;
  --border:    rgba(255,255,255,.07);
  --border2:   rgba(255,255,255,.13);

  --text:      #e8e8ed;
  --text2:     #9898a8;
  --text3:     #5a5a6a;

  --amber:     #f59e0b;
  --amber-dim: rgba(245,158,11,.15);
  --cyan:      #22d3ee;
  --cyan-dim:  rgba(34,211,238,.12);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,.12);
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,.12);
  --orange:    #fb923c;

  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Barlow', sans-serif;
  --cond: 'Barlow Condensed', sans-serif;

  --r:     10px;
  --r-sm:  6px;
  --safe:  env(safe-area-inset-bottom, 0px);
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════
   GRAIN OVERLAY
═══════════════════════════════════════════════════ */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  max-width: 600px; margin: 0 auto;
  padding: 0 0 calc(80px + var(--safe));
}

/* ═══════════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════════ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(12,12,14,.92);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px 12px;
  display: flex; align-items: center; gap: 12px;
}
.topbar-logo {
  font-family: var(--cond);
  font-size: 20px; font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
  flex: 1;
}
.topbar-logo span { color: var(--amber); }
.topbar-count {
  font-family: var(--mono);
  font-size: 10px; color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 3px 8px; border-radius: 99px;
}

/* ═══════════════════════════════════════════════════
   QR SCAN BANNER
═══════════════════════════════════════════════════ */
#scan-banner {
  display: none;
  margin: 12px 16px 0;
  background: linear-gradient(135deg, rgba(245,158,11,.1), rgba(34,211,238,.06));
  border: 1px solid rgba(245,158,11,.3);
  border-radius: var(--r);
  padding: 14px 16px;
  animation: fadeSlide .4s cubic-bezier(.32,1,.64,1) both;
}
#scan-banner.show { display: block; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.scan-banner-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.scan-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--amber-dim);
  border: 1px solid rgba(245,158,11,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.scan-label {
  font-family: var(--cond);
  font-size: 13px; font-weight: 600;
  letter-spacing: .5px; color: var(--amber);
  text-transform: uppercase;
}
.scan-id {
  font-family: var(--mono);
  font-size: 11px; color: var(--text2);
  margin-top: 1px;
}

/* ═══════════════════════════════════════════════════
   SEARCH BAR
═══════════════════════════════════════════════════ */
.search-row { padding: 12px 16px 0; }
.search-wrap {
  position: relative;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  display: flex; align-items: center;
  transition: border-color .15s;
}
.search-wrap:focus-within { border-color: var(--amber); }
.search-wrap svg { position: absolute; left: 14px; color: var(--text3); pointer-events: none; flex-shrink: 0; }
.search-wrap input {
  width: 100%; padding: 12px 14px 12px 42px;
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--sans); font-size: 15px; font-weight: 400;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-clear {
  padding: 0 14px; color: var(--text3); cursor: pointer;
  font-size: 18px; line-height: 1; display: none;
  transition: color .15s;
}
.search-clear:hover { color: var(--text); }

/* ═══════════════════════════════════════════════════
   FILTER CHIPS
═══════════════════════════════════════════════════ */
.chips-row {
  display: flex; gap: 6px;
  padding: 10px 16px 0;
  overflow-x: auto; scrollbar-width: none;
}
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 5px 12px; border-radius: 99px;
  font-family: var(--cond); font-size: 12px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  border: 1px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .15s; white-space: nowrap;
  user-select: none;
}
.chip:active { transform: scale(.96); }
.chip.on { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

/* ═══════════════════════════════════════════════════
   STATS ROW
═══════════════════════════════════════════════════ */
.stats-row {
  display: flex; gap: 16px; padding: 10px 18px 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px; margin: 8px 0 0;
}
.stat { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.stat b { color: var(--text2); font-weight: 500; }

/* ═══════════════════════════════════════════════════
   SECTION LABEL
═══════════════════════════════════════════════════ */
.sec-label {
  font-family: var(--cond);
  font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text3);
  padding: 16px 18px 6px;
}

/* ═══════════════════════════════════════════════════
   FILAMENT CARD (master)
═══════════════════════════════════════════════════ */
.card {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
  position: relative;
}
.card:active { background: var(--bg2); }
.card-accent {
  width: 3px; height: 36px; border-radius: 2px;
  flex-shrink: 0;
}
.card-body { flex: 1; min-width: 0; }
.card-id {
  font-family: var(--mono); font-size: 10px;
  color: var(--text3); margin-bottom: 2px;
}
.card-name {
  font-family: var(--cond); font-size: 17px; font-weight: 600;
  letter-spacing: .2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-brand { font-size: 12px; color: var(--text2); margin-top: 1px; }
.card-right { text-align: right; flex-shrink: 0; }
.card-mat {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 3px 7px; border-radius: 4px;
  display: inline-block; margin-bottom: 4px;
}
.card-temps {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  white-space: nowrap;
}
.chevron { color: var(--text3); margin-left: 4px; font-size: 14px; }

/* ═══════════════════════════════════════════════════
   COLOR CARD
═══════════════════════════════════════════════════ */
.color-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
}
.color-card:active { background: var(--bg2); }
.swatch {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,.1);
  flex-shrink: 0;
}
.color-card-body { flex: 1; min-width: 0; }
.color-card-id { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 1px; }
.color-card-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.color-card-parent { font-size: 11px; color: var(--text3); margin-top: 1px; }
.color-hex { font-family: var(--mono); font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* ═══════════════════════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════════════════════ */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.overlay.open { display: flex; align-items: flex-end; justify-content: center; }

.sheet {
  background: var(--bg1);
  border: 1px solid var(--border2);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 600px;
  max-height: 94dvh;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding-bottom: calc(32px + var(--safe));
  animation: sheetUp .28s cubic-bezier(.32,1,.64,1) both;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-handle {
  width: 38px; height: 4px;
  background: var(--border2); border-radius: 2px;
  margin: 12px auto 0;
}
.sheet-header {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.sheet-header-body { flex: 1; min-width: 0; }
.sheet-id { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.sheet-name { font-family: var(--cond); font-size: 26px; font-weight: 700; line-height: 1.1; }
.sheet-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.close-btn {
  width: 34px; height: 34px; border-radius: 99px;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all .15s;
}
.close-btn:active { transform: scale(.92); }

/* ── Swatch large ── */
.swatch-hero {
  margin: 14px 20px 0;
  height: 72px; border-radius: var(--r);
  border: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  letter-spacing: 1px;
}

/* ── Section heading ── */
.sh {
  font-family: var(--cond); font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text3); padding: 16px 20px 6px;
}

/* ── KPI grid ── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px; }
.kpi-grid.w1 { grid-template-columns: 1fr; }
.kpi-grid.w3 { grid-template-columns: 1fr 1fr 1fr; }
.kpi {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 13px;
}
.kpi-label { font-family: var(--cond); font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.kpi-value { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.kpi-value.lg { font-size: 22px; font-weight: 600; color: var(--amber); }
.kpi-value.sm { font-size: 12px; }
.kpi-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

/* Temp display */
.temp-val { font-family: var(--mono); font-size: 24px; font-weight: 600; }
.temp-range { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 99px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  border: 1px solid transparent;
}
.badge.ok  { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,.2); }
.badge.bad { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,.2); }
.badge.warn { background: var(--amber-dim); color: var(--amber); border-color: rgba(245,158,11,.25); }
.badge.mat { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

/* ── Color list inside master sheet ── */
.color-list { padding: 0 20px; }
.cl-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: opacity .1s;
}
.cl-item:last-child { border-bottom: none; }
.cl-item:active { opacity: .6; }
.cl-swatch { width: 22px; height: 22px; border-radius: 5px; border: 1px solid rgba(255,255,255,.08); flex-shrink: 0; }
.cl-name { font-size: 13px; font-weight: 500; flex: 1; }
.cl-id { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.cl-hex { font-family: var(--mono); font-size: 10px; color: var(--text3); }

/* Back link */
.back-link {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px 0; font-size: 13px; color: var(--amber);
  cursor: pointer; transition: opacity .15s;
}
.back-link:active { opacity: .6; }

/* ── Notiz box ── */
.notiz-box {
  margin: 0 20px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 13px;
  font-size: 13px; color: var(--text2); line-height: 1.5;
  font-style: italic;
}

/* ═══════════════════════════════════════════════════
   MATERIAL BADGE COLORS
═══════════════════════════════════════════════════ */
.m-pla    { background: rgba(74,222,128,.12); color: #4ade80; }
.m-petg   { background: rgba(34,211,238,.12); color: #22d3ee; }
.m-abs    { background: rgba(248,113,113,.12); color: #f87171; }
.m-asa    { background: rgba(248,113,113,.12); color: #f87171; }
.m-tpu    { background: rgba(167,139,250,.12); color: #a78bfa; }
.m-pa     { background: rgba(251,146,60,.12);  color: #fb923c; }
.m-pc     { background: rgba(251,146,60,.12);  color: #fb923c; }
.m-cf     { background: rgba(245,158,11,.12);  color: #f59e0b; }
.m-other  { background: var(--bg3); color: var(--text3); }

/* ═══════════════════════════════════════════════════
   EMPTY / LOADING
═══════════════════════════════════════════════════ */
.empty {
  text-align: center; padding: 64px 24px;
  color: var(--text3); font-size: 14px; line-height: 1.6;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .5; }

/* ═══════════════════════════════════════════════════
   STAGGER ANIMATION
═══════════════════════════════════════════════════ */
.card, .color-card {
  animation: rowIn .2s both;
}
@keyframes rowIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>

<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">FILAMENT<span>_</span>DB</div>
    <div class="topbar-count" id="total-count">— Einträge</div>
  </div>

  <!-- QR SCAN BANNER -->
  <div id="scan-banner">
    <div class="scan-banner-row">
      <div class="scan-icon">📱</div>
      <div>
        <div class="scan-label">QR-Code gescannt</div>
        <div class="scan-id" id="scan-id-label"></div>
      </div>
    </div>
    <div id="scan-inline"></div>
  </div>

  <!-- SEARCH -->
  <div class="search-row">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="Suche: ID, Material, Farbe…" autocomplete="off" autocorrect="off">
      <div class="search-clear" id="search-clear">×</div>
    </div>
  </div>

  <!-- FILTER CHIPS -->
  <div class="chips-row" id="chips">
    <div class="chip on"  data-f="all">Alle</div>
    <div class="chip"     data-f="BAM">Bambu Lab</div>
    <div class="chip"     data-f="ESN">eSUN</div>
    <div class="chip"     data-f="ERY">ERYONE</div>
    <div class="chip"     data-f="GEE">Geeetech</div>
    <div class="chip"     data-f="SUN">SUNLU</div>
    <div class="chip"     data-f="col">🎨 Farben</div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats"></div>

  <!-- LIST -->
  <div id="list"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════

    retract_mm, retract_spd, dry_temp, dry_h,
    bed_type, profile, ams, enclosure, notes]
═══════════════════════════════════════════════════ */

["BAM-007","Bambu Lab","PLA Sparkle","PLA",225,200,235,35,25,45,150,14,100,0.8,25,45,8,"Cool Plate / PEI","Bambu PLA Basic","Ja","Nein","Glitzerpartikel, Stahlnozzle empf."],
["BAM-008","Bambu Lab","PLA Glow","PLA",225,200,235,35,25,45,120,12,100,0.8,25,45,8,"Cool Plate / PEI","Bambu PLA Basic","Ja","Nein","Phosphoreszierend, sehr abrasiv"],
["BAM-009","Bambu Lab","PLA LW","PLA-LW",230,200,240,35,25,45,100,10,100,0.5,20,45,8,"Cool Plate / PEI","Generic PLA","Nein","Nein","Lightweight-Schaum, ~50% leichter"],

/* ── Lookup maps ── */
const masterMap = Object.fromEntries(M.map(m => [m[0], m]));

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
function brandColor(id) {
  return {BAM:'#f59e0b',ESN:'#4ade80',ERY:'#f87171',GEE:'#60a5fa',SUN:'#fb923c'}[id.slice(0,3)] || '#888';
}

function matClass(mat) {
  const m = mat.toUpperCase();
  if(m.includes('CF')||m.includes('GF')) return 'm-cf';
  if(m.startsWith('PLA')) return 'm-pla';
  if(m.startsWith('PETG')) return 'm-petg';
  if(m==='ABS'||m.startsWith('ABS')) return 'm-abs';
  if(m==='ASA') return 'm-asa';
  if(m.startsWith('TPU')) return 'm-tpu';
  if(m.startsWith('PA')||m.startsWith('PAHT')) return 'm-pa';
  if(m.startsWith('PC')||m==='PEEK'||m.startsWith('PPS')) return 'm-pc';
  return 'm-other';
}

function lum(hex) {
  const h = hex.replace('#','');
  return 0.299*parseInt(h.slice(0,2),16) + 0.587*parseInt(h.slice(2,4),16) + 0.114*parseInt(h.slice(4,6),16);
}

function textOnHex(hex) { return lum(hex) < 128 ? '#fff' : '#000'; }

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let filter = 'all';
let query  = '';

/* ══════════════════════════════════════════════════════
   LIST RENDER
══════════════════════════════════════════════════════ */
function render() {
  const q = query.toLowerCase();

  const masters = M.filter(m => {
    if(filter === 'col') return false;
    if(filter !== 'all' && !m[0].startsWith(filter)) return false;
    if(q && !m[0].toLowerCase().includes(q) && !m[2].toLowerCase().includes(q) &&
       !m[3].toLowerCase().includes(q) && !m[1].toLowerCase().includes(q)) return false;
    return true;
  });

  const colors = (filter === 'col' || filter === 'all') ? C.filter(c => {
    if(q && !c[0].toLowerCase().includes(q) && !c[2].toLowerCase().includes(q) &&
       !c[3].toLowerCase().includes(q)) return false;
    return true;
  }) : [];

  // Stats
  document.getElementById('stats').innerHTML =
    `<div class="stat">Filamente <b>${masters.length}</b></div>` +
    (colors.length ? `<div class="stat">Farben <b>${colors.length}</b></div>` : '') +
    `<div class="stat">Gesamt <b>${masters.length + colors.length}</b></div>`;

  let html = '';

  if(masters.length) {
    if(filter === 'all') html += `<div class="sec-label">Master-Filamente</div>`;
    masters.forEach((m, i) => {
      const bc = brandColor(m[0]);
      html += `
        <div class="card" style="animation-delay:${Math.min(i,20)*15}ms" onclick="openMaster('${m[0]}')">
          <div class="card-accent" style="background:${bc}"></div>
          <div class="card-body">
            <div class="card-id">${m[0]}</div>
            <div class="card-name">${m[2]}</div>
            <div class="card-brand">${m[1]}</div>
          </div>
          <div class="card-right">
            <div class="card-mat badge mat ${matClass(m[3])}">${m[3]}</div>
            <div class="card-temps">${m[4]}° / ${m[7]}°</div>
          </div>
          <span class="chevron">›</span>
        </div>`;
    });
  }

  if(colors.length) {
    html += `<div class="sec-label" style="margin-top:8px">Farb-Varianten</div>`;
    colors.forEach((c, i) => {
      const master = masterMap[c[1]];
      html += `
        <div class="color-card" style="animation-delay:${Math.min(i,20)*10}ms" onclick="openColor('${c[0]}')">
          <div class="swatch" style="background:${c[3]}"></div>
          <div class="color-card-body">
            <div class="color-card-id">${c[0]}</div>
            <div class="color-card-name">${c[2]}</div>
            <div class="color-card-parent">${master ? master[2] : c[1]}</div>
          </div>
          <div class="color-hex">${c[3]}</div>
          <span class="chevron" style="color:var(--text3);font-size:14px">›</span>
        </div>`;
    });
  }

  if(!html) {
    html = `<div class="empty"><div class="empty-icon">🔍</div>Keine Treffer für „${query}"</div>`;
  }

  document.getElementById('list').innerHTML = html;
  document.getElementById('total-count').textContent = `${M.length + C.length} Einträge`;
}

        <div class="kpi-value">${spd} <span style="font-size:11px;color:var(--text3)">mm/s</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Max. Volumenstrom</div>
        <div class="kpi-value">${vol} <span style="font-size:11px;color:var(--text3)">mm³/s</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Kühlluft</div>
        <div class="kpi-value">${cool} <span style="font-size:11px;color:var(--text3)">%</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Einzug</div>
        <div class="kpi-value sm">${rlen} mm · ${rspd} mm/s</div>
      </div>
    </div>

    <div class="sh">Trocknung & Druckbett</div>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Trocknen</div>

        <div class="kpi-sub">${dh} Stunden</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Druckbett-Typ</div>

    </div>

    <div class="sh">Kompatibilität</div>

      <div class="kpi">

      </div>
      <div class="kpi">
        <div class="kpi-label">Gehäuse nötig</div>
        <div style="margin-top:4px"><span class="badge ${encOn?'warn':'ok'}">${encOn?'⚠ Ja':'✓ Nein'}</span></div>

    <div class="sh">Bambu Studio</div>

    ${notes ? `<div class="sh">Notizen</div><div class="notiz-box">${notes}</div>` : ''}

    ${colors.length ? `
    <div class="sh">Verfügbare Farben <span style="color:var(--text3);font-weight:400">(${colors.length})</span></div>

/* ══════════════════════════════════════════════════════
   SHEET CONTROLS
══════════════════════════════════════════════════════ */
function openSheet(html) {
  document.getElementById('sheet-content').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('sheet').scrollTop = 0;
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function openMaster(id) {
  const m = masterMap[id];
  if(m) openSheet(buildMasterHTML(m));
}

function openColor(id) {
  const c = colorMap[id];
  if(c) openSheet(buildColorHTML(c));
}

function handleOverlayClick(e) {
  if(e.target === document.getElementById('overlay')) closeSheet();
}

window.openMaster = openMaster;
window.openColor  = openColor;
window.closeSheet = closeSheet;
window.handleOverlayClick = handleOverlayClick;

/* ══════════════════════════════════════════════════════
   QR SCAN — URL PARAM HANDLING
══════════════════════════════════════════════════════ */
(function() {
  const id = new URLSearchParams(location.search).get('id');
  if(!id) return;

  const banner  = document.getElementById('scan-banner');
  const label   = document.getElementById('scan-id-label');
  const inline  = document.getElementById('scan-inline');
  banner.classList.add('show');
  label.textContent = id;

  // Auto-open sheet after short delay
  requestAnimationFrame(() => {
    setTimeout(() => {
      if(masterMap[id]) openMaster(id);
      else if(colorMap[id]) openColor(id);
      else inline.innerHTML = `<p style="font-size:12px;color:var(--text3);padding:4px 0">ID „${id}" nicht in der Datenbank gefunden.</p>`;
    }, 300);
  });
})();

/* ══════════════════════════════════════════════════════
   EVENT LISTENERS
══════════════════════════════════════════════════════ */
const searchEl = document.getElementById('search');
const clearEl  = document.getElementById('search-clear');

searchEl.addEventListener('input', e => {
  query = e.target.value;
  clearEl.style.display = query ? 'block' : 'none';
  render();
});

clearEl.addEventListener('click', () => {
  searchEl.value = ''; query = '';
  clearEl.style.display = 'none';
  render();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    filter = chip.dataset.f;
    render();
  });
});

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeSheet();
});

// Swipe down to close sheet
let touchStartY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('sheet').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(dy > 80 && document.getElementById('sheet').scrollTop < 5) closeSheet();
}, {passive:true});

render();
</script>
